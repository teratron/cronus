packages:
  - "packages/*"
  - "apps/*"

# Single source of truth for versions shared across packages/ui and apps/desktop.
# Each package references these with the `catalog:` protocol, so a version can
# never drift between the shared UI library and the app that consumes it.
catalog:
  react: ^19.2.7
  react-dom: ^19.2.7
  typescript: ^7.0.2
  vite: ^8.1.5
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.3

minimumReleaseAgeExclude:
  - vite@8.1.2 || 8.1.4 || 8.1.5
  - "@fallow-cli/darwin-arm64@3.0.0 || 3.2.0 || 3.3.0 || 3.4.2 || 3.5.0 || 3.5.1 || 3.6.0"
